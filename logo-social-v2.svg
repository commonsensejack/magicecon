<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- White circle -->
  <circle cx="200" cy="200" r="200" fill="#ffffff" stroke="#111111" stroke-width="3"/>

  <!-- M serif path, carefully centered -->
  <path d="
    M 100,238
    L 100,148
    L 114,148
    L 126,190
    L 138,148
    L 152,148
    L 152,238
    L 166,238
    L 166,168
    L 174,155
    L 182,168
    L 182,238
    Z
    M 114,148 L 126,185 L 138,148
  " fill="none" stroke="#111111" stroke-width="10" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- E serif path, same baseline as M -->
  <path d="
    M 210,238 L 210,148
    L 262,148 L 262,166
    L 235,166 L 235,188
    L 257,188 L 257,206
    L 235,206 L 235,220
    L 262,220 L 262,238
    L 210,238 Z
  " fill="#111111"/>

  <!-- Rule below -->
  <rect x="100" y="266" width="162" height="1.2" fill="#111111"/>

  <!-- MAGIC ECON -->
  <text x="181" y="296" font-family="Georgia, serif" font-size="14" text-anchor="middle" fill="#555555" letter-spacing="3.5">MAGIC ECON</text>

  <!-- Red dot -->
  <circle cx="181" cy="318" r="3.5" fill="#c8102e"/>
</svg>
