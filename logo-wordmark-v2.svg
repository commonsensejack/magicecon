<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <rect width="400" height="120" fill="#ffffff"/>

  <!-- Top rule (Economist masthead style) -->
  <rect x="50" y="20" width="300" height="1.2" fill="#111111"/>

  <!-- "Magic" bold serif - text-anchor middle at x=200 -->
  <!-- at size 52, approx width 190px, so x should be 200-95=105 to center -->
  <text x="105" y="68" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#111111" letter-spacing="1">Magic</text>

  <!-- "Econ" regular serif - same baseline, starts right after "Magic" -->
  <!-- "Econ" at size 52 ≈ 162px wide, starts at x≈197 -->
  <text x="197" y="68" font-family="Georgia, serif" font-size="52" font-weight="400" fill="#111111" letter-spacing="1">Econ</text>

  <!-- Red accent line below -->
  <rect x="50" y="80" width="300" height="2.5" fill="#c8102e"/>

  <!-- Small tagline -->
  <text x="200" y="100" font-family="Georgia, serif" font-size="11" text-anchor="middle" fill="#888888" letter-spacing="3">INDEPENDENT RESEARCH</text>
</svg>
