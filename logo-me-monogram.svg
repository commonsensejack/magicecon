<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#ffffff"/>
  <!-- "ME" in classic serif (Caslon-esque via serif letterforms) -->
  <!-- Thick/thin contrast serif M -->
  <text x="100" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="400" text-anchor="middle" fill="#111111" letter-spacing="-2">ME</text>
  <!-- Economist-style horizontal rule below -->
  <rect x="50" y="136" width="100" height="1.5" fill="#111111"/>
  <!-- Subtle "Magic Econ" small text -->
  <text x="100" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#555555" letter-spacing="2.5">MAGIC ECON</text>
  <!-- Tiny red dot accent (Economist magazine uses red) -->
  <circle cx="100" cy="172" r="2.5" fill="#c8102e"/>
</svg>
