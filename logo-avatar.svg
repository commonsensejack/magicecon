<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Circular background -->
  <circle cx="200" cy="200" r="200" fill="#111111"/>
  <!-- "M" large serif - stands for Magic -->
  <text x="200" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="400" text-anchor="middle" fill="#ffffff" letter-spacing="-4">M</text>
  <!-- "E" serif - for Econ, slightly smaller, offset right -->
  <text x="248" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="400" text-anchor="middle" fill="#ffffff" letter-spacing="-4">E</text>
  <!-- Horizontal rule in white -->
  <rect x="100" y="228" width="200" height="1.5" fill="#ffffff"/>
  <!-- Small "MAGIC ECON" below rule -->
  <text x="200" y="256" font-family="Georgia, 'Times New Roman', serif" font-size="14" text-anchor="middle" fill="#888888" letter-spacing="3.5">MAGIC ECON</text>
  <!-- Red accent dot -->
  <circle cx="200" cy="278" r="3" fill="#c8102e"/>
</svg>
